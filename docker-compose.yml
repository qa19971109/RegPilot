services:
  regpilot:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.1ms.run/library/python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    image: regpilot:local
    container_name: regpilot
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REGPILOT_HOST: ${REGPILOT_HOST:-0.0.0.0}
      REGPILOT_PORT: ${REGPILOT_PORT:-8766}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
